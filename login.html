<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSC | Login</title>
    <style>
        body, html { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; }
        .bg-image {
            background-image: url("Images/HSC Site Background.jpg");
            height: 100%; background-position: center; background-repeat: no-repeat; background-size: cover;
            display: flex; justify-content: center; align-items: center;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
            padding: 40px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.1);
            width: 320px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        .logo { width: 100%; max-width: 250px; margin-bottom: 20px; }
        select {
            width: 100%; padding: 12px; margin: 20px 0; background: #1a1e23;
            color: white; border: 1px solid #444; border-radius: 5px; cursor: pointer;
        }
        .login-btn {
            background-color: #0056b3; color: white; border: none; padding: 12px;
            width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer;
        }
        .login-btn:hover { background-color: #004494; }
    </style>
</head>
<body>
    <div class="bg-image">
        <div class="login-card">
            <img src="Images/HSC Logo.jpg" alt="HSC Logo" class="logo">
            <h2 style="font-weight: 300;">USER LOGIN</h2>
            <select id="userSelect">
                <option value="" disabled selected>Select Your Name</option>
                <option value="Cody Haines">Cody Haines</option>
                <option value="Debra Barrone">Debra Barrone</option>
                <option value="Jayde Tuttle">Jayde Tuttle</option>
                <option value="Kelley Haines">Kelley Haines</option>
            </select>
            <button onclick="login()" class="login-btn">LOG IN</button>
        </div>
    </div>

    <script>
        function login() {
            const user = document.getElementById('userSelect').value;
            if (user) {
                sessionStorage.setItem('hsc_user', user);
                window.location.href = 'index.html';
            } else {
                alert('Please select a user.');
            }
        }
    </script>
</body>
</html>
